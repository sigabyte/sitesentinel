spring.application.name=SiteSentinel

server.port=8091

spring.datasource.url=jdbc:postgresql://localhost:5432/sitesentinel_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# SiteSentinel scanner configuration
sitesentinel.scanner.connect-timeout-seconds=8
sitesentinel.scanner.request-timeout-seconds=15
sitesentinel.scanner.user-agent=SiteSentinel/1.0 (+https://sitesentinel.local; website trust monitoring)
sitesentinel.scanner.scan-robots-txt=true
sitesentinel.scanner.scan-sitemap-xml=true
sitesentinel.scanner.body-snippet-max-length=1000
sitesentinel.scanner.allow-private-targets=false
sitesentinel.scanner.max-redirects=5

# SiteSentinel scheduled monitoring configuration
sitesentinel.scheduler.enabled=${SITESENTINEL_SCHEDULER_ENABLED:false}
sitesentinel.scheduler.initial-delay-ms=15000
sitesentinel.scheduler.fixed-delay-ms=30000
sitesentinel.scheduler.stale-active-run-timeout-minutes=60

# SiteSentinel Telegram notification delivery configuration
# Sprint 9 safety rule: real Telegram delivery is disabled by default.
sitesentinel.notification.delivery.telegram.enabled=${SITESENTINEL_TELEGRAM_ENABLED:false}

# Sprint 14 safety rule:
# automatic monitoring-run PDF dispatch requires a separate opt-in.
sitesentinel.notification.delivery.telegram.automatic-pdf-dispatch-enabled=${SITESENTINEL_TELEGRAM_AUTOMATIC_PDF_DISPATCH_ENABLED:false}

sitesentinel.notification.delivery.telegram.bot-token=${SITESENTINEL_TELEGRAM_BOT_TOKEN:}
sitesentinel.notification.delivery.telegram.chat-id=${SITESENTINEL_TELEGRAM_CHAT_ID:}
sitesentinel.notification.delivery.telegram.api-base-url=https://api.telegram.org
sitesentinel.notification.delivery.telegram.connect-timeout-seconds=5
sitesentinel.notification.delivery.telegram.request-timeout-seconds=10

# SiteSentinel OpenAI recommendation provider configuration
# Sprint 15 safety rule:
# external AI recommendation calls are disabled by default.
sitesentinel.recommendation.ai.openai.enabled=${SITESENTINEL_OPENAI_ENABLED:false}

# API credentials must only be supplied through environment configuration.
sitesentinel.recommendation.ai.openai.api-key=${SITESENTINEL_OPENAI_API_KEY:}

# OpenAI Responses API configuration.
sitesentinel.recommendation.ai.openai.api-base-url=${SITESENTINEL_OPENAI_API_BASE_URL:https://api.openai.com/v1}
sitesentinel.recommendation.ai.openai.model=${SITESENTINEL_OPENAI_MODEL:gpt-5.6-terra}

# Provider timeout and bounded-output configuration.
sitesentinel.recommendation.ai.openai.connect-timeout-seconds=${SITESENTINEL_OPENAI_CONNECT_TIMEOUT_SECONDS:10}
sitesentinel.recommendation.ai.openai.request-timeout-seconds=${SITESENTINEL_OPENAI_REQUEST_TIMEOUT_SECONDS:60}
sitesentinel.recommendation.ai.openai.max-output-tokens=${SITESENTINEL_OPENAI_MAX_OUTPUT_TOKENS:2000}